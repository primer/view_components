name: Lint

on:
  pull_request:
    branches:
      - '*'
  merge_group:
    branches:
      - main
    types:
      - checks_requested
permissions: {}
jobs:
  markdown:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        persist-credentials: false
    - name: Get specific changed files
      id: changed-files
      uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96
      with:
        files: |
          docs/**/*.md
          README.md
          CONTRIBUTING.md
          CODE_OF_CONDUCT.md
    - uses: xt0rted/markdownlint-problem-matcher@1a5fabfb577370cfdf5af944d418e4be3ea06f27 # v3
      if: steps.changed-files.outputs.any_changed == 'true'
    - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
      if: steps.changed-files.outputs.any_changed == 'true'
      with:
        cache: 'npm'
    - name: Lint with Markdownlint
      if: steps.changed-files.outputs.any_changed == 'true'
      run: |
        npm ci
        npx markdownlint-cli2 ${STEPS_CHANGED_FILES_OUTPUTS_ALL_CHANGED_FILES}
      env:
        STEPS_CHANGED_FILES_OUTPUTS_ALL_CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}

  rubocop:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        persist-credentials: false
    - name: Get specific changed files
      id: changed-files
      uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96
      with:
        files: |
          app/**/*.rb
          lib/**/*.rb
          demo/**/*.rb
          test/**/*.rb
    - uses: ruby/setup-ruby@6aaa311d81eba98ae12eaffbcb63296ace0efcde # v1
      with:
        ruby-version: '3.4'
        bundler-cache: true
    - name: Lint with Rubocop
      run: script/rubocop --format github

  erblint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        persist-credentials: false
    - name: Get changed files
      id: changed-files
      uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96
      with:
        files: |
          app/components/**/*.erb
    - uses: ruby/setup-ruby@6aaa311d81eba98ae12eaffbcb63296ace0efcde # v1
      with:
        ruby-version: '3.4'
        bundler-cache: true
    - name: Lint with ERB Lint
      run: script/erblint --format github

  eslint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        persist-credentials: false
    - name: Get changed files
      id: changed-files
      uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96
      with:
        files: |
          app/components/**/*.ts
    - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
      if: steps.changed-files.outputs.any_changed == 'true'
      with:
        cache: 'npm'
    - name: Lint with ESLint
      if: steps.changed-files.outputs.any_changed == 'true'
      run: |
        npm ci
        npx eslint --quiet ${STEPS_CHANGED_FILES_OUTPUTS_ALL_CHANGED_FILES}
      env:
        STEPS_CHANGED_FILES_OUTPUTS_ALL_CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}

  stylelint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        persist-credentials: false
    - name: Get changed files
      id: changed-files
      uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96
      with:
        files: |
          app/components/**/*.pcss
          lib/postcss_mixins/*.pcss
    - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
      if: steps.changed-files.outputs.any_changed == 'true'
      with:
        cache: 'npm'
    - name: Lint with Stylelint
      if: steps.changed-files.outputs.any_changed == 'true'
      run: |
        npm ci
        npx stylelint --rd -q ${STEPS_CHANGED_FILES_OUTPUTS_ALL_CHANGED_FILES} --custom-formatter=stylelint-actions-formatters
      env:
        STEPS_CHANGED_FILES_OUTPUTS_ALL_CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}

  herb:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        persist-credentials: false
    - name: Lint with Herb
      run: |
        npx @herb-tools/linter@0.8.10
